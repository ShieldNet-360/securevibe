name: Notify on new PR

# Pushes an ntfy notification whenever a pull request is opened against the
# repository, so maintainers learn about new PRs (including ones opened
# manually or by automation) without polling GitHub.
#
# The ntfy endpoint is stored in the NTFY_URL repository secret
# (e.g. https://ntfy.sh/<your-topic>) so the topic is not exposed in the
# public workflow file. PRs opened from forks do not receive secrets, so
# they will simply skip the notification.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  ntfy:
    runs-on: ubuntu-latest
    steps:
      - name: Push ntfy notification
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ -z "$NTFY_URL" ]; then
            echo "NTFY_URL secret not set (or fork PR); skipping notification."
            exit 0
          fi
          curl -fsS \
            -H "Title: securevibe: new PR #${PR_NUMBER}" \
            -H "Tags: package,robot" \
            -H "Click: ${PR_URL}" \
            -d "${PR_TITLE} — by ${PR_AUTHOR}
          ${PR_URL}" \
            "$NTFY_URL"
